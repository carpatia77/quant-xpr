name: Weekly Ingestion
on:
  schedule:
    - cron: '0 0 * * 0' # Roda todo domingo à meia-noite
  workflow_dispatch: # Permite disparar o job manualmente pelo painel do GitHub
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Acelera a instalação nas próximas runs
        
      - name: Install dependencies (Backend & Tests)
        run: |
          python -m pip install --upgrade pip
          pip install uv
          cd backend
          uv pip install -r requirements.txt --system
        
      - name: Run Tests (Pytest)
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          cd backend
          PYTHONPATH=. pytest tests/ -m "not slow"
          
      - name: Install Ingestion Dependencies
        run: |
          cd ingestion
          pip install -r requirements.txt
          
      - name: Run Weekly Ingestion Job
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd ingestion
          python weekly_job.py
