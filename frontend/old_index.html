<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institutional Quant Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background-color: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-top: 20px; }
        .flex-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        input[type="text"], input[type="password"] { padding: 10px; flex: 1; border: none; border-radius: 4px; background: #2d2d2d; color: white; }
        button { padding: 10px 20px; border: none; border-radius: 4px; background: #007bff; color: white; cursor: pointer; }
        button:hover { background: #0056b3; }
        .metric { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }
        .signal-box { font-size: 1.5em; font-weight: bold; text-align: center; padding: 15px; margin-top: 20px; border-radius: 4px; background: #2d2d2d; }
        .success { color: #4caf50; }
        .error { color: #f44336; }
        .chart-container { position: relative; height: 300px; width: 100%; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #333; }
        th { background-color: #2d2d2d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 Institutional Quant Dashboard</h1>
        <div class="card">
            <div class="flex-row">
                <input type="password" id="apiKey" placeholder="API Key">
                <input type="text" id="baseUrl" placeholder="API Base URL (e.g., http://localhost:8000)">
            </div>
            <div class="flex-row">
                <input type="text" id="ticker" placeholder="Enter Ticker (e.g. SPY, PETR4.SA)" value="SPY">
                <button onclick="fetchSummary()">Analyze Engine</button>
                <button onclick="fetchHistory()" style="background: #ff9800;">Load History</button>
            </div>
            <div id="loader" style="display:none; margin-top: 10px; color: #aaa;">⏳ Processing models...</div>
        </div>

        <div class="card" id="results" style="display: none;">
            <h2>Live Analysis: <span id="res-ticker"></span></h2>
            <div class="signal-box" id="res-signal"></div>
            
            <div class="metric"><span>Markov Bull Probability:</span> <span id="res-bull"></span></div>
            <div class="metric"><span>Markov Bear Probability:</span> <span id="res-bear"></span></div>
            <div class="metric"><span>ATM Implied Volatility:</span> <span id="res-iv"></span></div>
            <div class="metric"><span>Volatility Skew:</span> <span id="res-skew"></span></div>
            <div class="metric"><span>Engine Status:</span> <span id="res-status" style="font-size: 0.8em; color: #888;"></span></div>
            
            <div class="chart-container">
                <canvas id="regimeChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="smileChart"></canvas>
            </div>
        </div>

        <div class="card" id="history-section" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Saved History</h2>
                <button onclick="exportCSV()" style="background: #4caf50;">Export CSV</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Ticker</th>
                        <th>Bull Prob</th>
                        <th>Bear Prob</th>
                        <th>ATM IV</th>
                        <th>Skew</th>
                        <th>Signal</th>
                    </tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let regimeChartInstance = null;
        let smileChartInstance = null;
        let historyData = [];

        window.onload = () => {
            const savedKey = localStorage.getItem('quantApiKey');
            const savedUrl = localStorage.getItem('quantApiUrl') || (window.location.hostname === 'localhost' ? 'http://localhost:8000' : 'https://api.yourdomain.com');
            if(savedKey) document.getElementById('apiKey').value = savedKey;
            document.getElementById('baseUrl').value = savedUrl;
        };

        function getHeaders() {
            const apiKey = document.getElementById('apiKey').value;
            localStorage.setItem('quantApiKey', apiKey);
            return { 'X-API-Key': apiKey };
        }

        function getBaseUrl() {
            const url = document.getElementById('baseUrl').value;
            localStorage.setItem('quantApiUrl', url);
            return url.replace(/\/$/, "");
        }

        async function fetchSummary() {
            const ticker = document.getElementById('ticker').value;
            const loader = document.getElementById('loader');
            const results = document.getElementById('results');
            loader.style.display = 'block';
            results.style.display = 'none';

            try {
                const response = await fetch(`${getBaseUrl()}/v1/summary/${ticker}`, { headers: getHeaders() });
                if (!response.ok) throw new Error('API Error or Invalid API Key');
                
                const data = await response.json();
                
                document.getElementById('res-ticker').textContent = data.ticker;
                document.getElementById('res-bull').textContent = (data.markov_bull_prob * 100).toFixed(2) + '%';
                document.getElementById('res-bear').textContent = (data.markov_bear_prob * 100).toFixed(2) + '%';
                document.getElementById('res-iv').textContent = (data.iv_atm * 100).toFixed(2) + '%';
                document.getElementById('res-skew').textContent = (data.skew * 100).toFixed(2) + '%';
                document.getElementById('res-status').textContent = data.status;
                
                const signalBox = document.getElementById('res-signal');
                signalBox.textContent = `SIGNAL: ${data.signal.toUpperCase()}`;
                signalBox.className = data.signal.includes('error') ? 'signal-box error' : 'signal-box success';

                renderRegimeChart(data.regime_history || []);
                renderSmileChart(data.smile_data || []);

                results.style.display = 'block';
            } catch (err) {
                alert(err.message);
            } finally {
                loader.style.display = 'none';
            }
        }

        async function fetchHistory() {
            const ticker = document.getElementById('ticker').value;
            try {
                const response = await fetch(`${getBaseUrl()}/v1/history/${ticker}?limit=50`, { headers: getHeaders() });
                if (!response.ok) throw new Error('Failed to fetch history');
                historyData = await response.json();
                
                const tbody = document.getElementById('history-body');
                tbody.innerHTML = '';
                
                historyData.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${new Date(row.timestamp).toLocaleString()}</td>
                        <td>${row.ticker}</td>
                        <td>${(row.markov_bull_prob * 100).toFixed(1)}%</td>
                        <td>${(row.markov_bear_prob * 100).toFixed(1)}%</td>
                        <td>${(row.iv_atm * 100).toFixed(1)}%</td>
                        <td>${(row.skew * 100).toFixed(1)}%</td>
                        <td>${row.signal}</td>
                    `;
                    tbody.appendChild(tr);
                });
                
                document.getElementById('history-section').style.display = 'block';
            } catch(e) {
                alert(e.message);
            }
        }

        function exportCSV() {
            if(!historyData.length) return alert("No history to export.");
            const headers = ["Timestamp", "Ticker", "Bull Prob", "Bear Prob", "ATM IV", "Skew", "Signal"];
            const rows = historyData.map(r => [
                r.timestamp, r.ticker, r.markov_bull_prob, r.markov_bear_prob, r.iv_atm, r.skew, r.signal
            ].join(","));
            
            const csvContent = "data:text/csv;charset=utf-8," + [headers.join(","), ...rows].join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `quant_history_${document.getElementById('ticker').value}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function renderRegimeChart(history) {
            if (regimeChartInstance) regimeChartInstance.destroy();
            if (!history.length) return;

            const ctx = document.getElementById('regimeChart').getContext('2d');
            const dates = history.map(h => h.date);
            const prices = history.map(h => h.price);
            const bgColors = history.map(h => h.regime === 2 ? 'rgba(76, 175, 80, 0.2)' : h.regime === 0 ? 'rgba(244, 67, 54, 0.2)' : 'rgba(255, 255, 255, 0.1)');

            regimeChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dates,
                    datasets: [{
                        type: 'line',
                        label: 'Price',
                        data: prices,
                        borderColor: '#fff',
                        borderWidth: 2,
                        tension: 0.1,
                        yAxisID: 'y'
                    }, {
                        type: 'bar',
                        label: 'Regime (Green=Bull, Red=Bear)',
                        data: prices.map(p => Math.max(...prices)), // Fill height
                        backgroundColor: bgColors,
                        yAxisID: 'y'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { title: { display: true, text: 'Recent Price & Markov Regime' } },
                    scales: { y: { min: Math.min(...prices) * 0.95 } }
                }
            });
        }

        function renderSmileChart(smileData) {
            if (smileChartInstance) smileChartInstance.destroy();
            if (!smileData.length) return;

            const ctx = document.getElementById('smileChart').getContext('2d');
            
            // Sort by strike
            smileData.sort((a, b) => a.strike - b.strike);

            smileChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: smileData.map(d => d.strike),
                    datasets: [{
                        label: 'Implied Volatility',
                        data: smileData.map(d => d.iv),
                        borderColor: '#ff9800',
                        backgroundColor: 'rgba(255, 152, 0, 0.2)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { title: { display: true, text: 'Volatility Smile (Calls)' } },
                    scales: {
                        x: { title: { display: true, text: 'Strike' } },
                        y: { title: { display: true, text: 'IV' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
